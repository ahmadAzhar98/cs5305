# Set the root logger level
rootLogger.level = INFO
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.rolling.ref = RollingFile

# --- Console Appender (What you see in the Notebook) ---
appender.stdout.type = Console
appender.stdout.name = STDOUT
appender.stdout.layout.type = PatternLayout
appender.stdout.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n
# Set this to ERROR to hide almost everything in the notebook
appender.stdout.filter.threshold.type = ThresholdFilter
appender.stdout.filter.threshold.level = ERROR

# --- File Appender (What goes to your /opt/spark/logs volume) ---
appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = /opt/spark/logs/spark-shell.log
appender.rolling.filePattern = /opt/spark/logs/spark-shell.log.%d{dd-MMM}.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{ISO8601} %p %c: %m%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy